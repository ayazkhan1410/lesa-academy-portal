services:

  # ================================
  # Database
  # ================================
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"

  # ================================
  # Redis
  # ================================
  redis:
    image: redis:8.6-alpine
    ports:
      - "6379:6379"

  # ================================
  # Backend
  # ================================
  backend:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  # ================================
  # Celery Worker
  # ================================
  celery_worker:
    build: .
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: celery -A config.celery_app worker --loglevel=info

  # ================================
  # Flower
  # ================================
  flower:
    build: .
    volumes:
      - .:/app
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - redis
      - celery_worker
    command: celery -A config.celery_app flower --port=5555

  # ================================
  # Frontend
  # ================================
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "5173:5173"
    depends_on:
      - backend

  # ================================
  # Volumes
  # ================================
volumes:
  postgres_data:
